const STEPS = ["Pohlaví", "Údaje", "% tuku", "Aktivita", "Výsledky"];

const activityLevels = [
  { label: "Sedavá aktivita", desc: "Do 5 000 kroků denně, kancelářská práce, minimum pohybu, žádný nebo max 1–2 lehké tréninky týdně", coef: 1.2, icon: "💻" },
  { label: "Lehce aktivní", desc: "5 000–10 000 kroků denně, cca 2–3 tréninky týdně, lehký běžný pohyb během dne", coef: 1.35, icon: "🚶" },
  { label: "Aktivní", desc: "10 000–15 000+ kroků denně, 4–6 tréninků týdně, pravidelný sport, vyšší denní výdej", coef: 1.55, icon: "🏃" },
  { label: "Velmi aktivní", desc: "Fyzická práce, 15 000–20 000+ kroků, těžké tréninky, 2 fáze denně nebo sport na vysoké úrovni", coef: 1.75, icon: "🔥" },
];

const fatLevels = {
  female: [45, 40, 35, 30, 25, 20, 15],
  male: [35, 30, 25, 20, 15, 12, 8],
};

let state = {
  step: 0,
  gender: null,
  age: "", height: "", weight: "", targetWeight: "",
  fatPct: null,
  activityIdx: null,
  showFatImg: false,
};

function calcResults() {
  const { gender, age, height, weight, activityIdx } = state;
  const coef = activityLevels[activityIdx].coef;
  const w = Number(weight), h = Number(height), a = Number(age);
  const bmr = gender === "female"
    ? 10 * w + 6.25 * h - 5 * a - 161
    : 10 * w + 6.25 * h - 5 * a + 5;
  const tdee = bmr * coef;
  const deficit = tdee * 0.80;
  const protein = w * 1.6;
  const fat = w * 0.7;
  const proteinKcal = protein * 4;
  const fatKcal = fat * 9;
  const carbsKcal = deficit - proteinKcal - fatKcal;
  const carbs = carbsKcal / 4;
  return {
    bmr: Math.round(bmr),
    tdee: Math.round(tdee),
    deficit: Math.round(deficit),
    protein: Math.round(protein),
    fat: Math.round(fat),
    carbs: Math.round(carbs),
    proteinKcal: Math.round(proteinKcal),
    fatKcal: Math.round(fatKcal),
    carbsKcal: Math.round(carbsKcal),
  };
}

function weeksToGoal() {
  const tw = Number(state.targetWeight), w = Number(state.weight);
  if (!state.targetWeight || tw >= w) return null;
  const kg = w - tw;
  return { min: Math.round(kg / 1), max: Math.round(kg / 0.5) };
}

function canNext() {
  const { step, gender, age, height, weight, fatPct, activityIdx } = state;
  if (step === 0) return gender !== null;
  if (step === 1) return age && height && weight && Number(age) > 0 && Number(height) > 0 && Number(weight) > 0;
  if (step === 2) return fatPct !== null;
  if (step === 3) return activityIdx !== null;
  return true;
}

function progressPct() { return (state.step / (STEPS.length - 1)) * 100; }

function el(tag, attrs, ...children) {
  const e = document.createElement(tag);
  if (attrs) {
    Object.entries(attrs).forEach(([k, v]) => {
      if (k === "style" && typeof v === "object") Object.assign(e.style, v);
      else if (k === "onClick") e.addEventListener("click", v);
      else if (k === "onChange") e.addEventListener("input", v);
      else if (k === "src") e.src = v;
      else if (k === "alt") e.alt = v;
      else if (k === "href") e.href = v;
      else if (k === "target") e.target = v;
      else if (k === "rel") e.rel = v;
      else if (k === "type") e.type = v;
      else if (k === "placeholder") e.placeholder = v;
      else if (k === "min") e.min = v;
      else if (k === "disabled") e.disabled = v;
      else if (k === "value") e.value = v;
      else e.setAttribute(k, v);
    });
  }
  children.flat().forEach(c => {
    if (c === null || c === undefined) return;
    if (typeof c === "string" || typeof c === "number") e.appendChild(document.createTextNode(c));
    else e.appendChild(c);
  });
  return e;
}

function txt(str) { return document.createTextNode(str); }

function render() {
  const app = document.getElementById("app");
  app.innerHTML = "";

  // Header
  const header = el("div", { style: { width: "100%", paddingTop: "40px", paddingBottom: "8px", display: "flex", flexDirection: "column", alignItems: "center", gap: "4px" } },
    el("div", { style: { fontFamily: "Arial Black, Arial, sans-serif", fontWeight: 900, fontSize: "13px", letterSpacing: "0.35em", color: "#e53e2e", textTransform: "uppercase" } }, "SEMI FITNESS"),
    el("h1", { style: { fontSize: "clamp(22px,5vw,28px)", fontWeight: 700, textAlign: "center", letterSpacing: "-0.01em", lineHeight: 1.2, margin: 0 } },
      txt("Tvůj kalorický příjem"), el("br", null), el("span", { style: { color: "#e53e2e" } }, "na míru")
    ),
    el("p", { style: { color: "#888", fontSize: "13px", margin: "8px 0 0", textAlign: "center", fontFamily: "Arial, sans-serif" } }, "4 kroky — přesný plán pro hubnutí.")
  );
  app.appendChild(header);

  // Progress
  const progWrap = el("div", { style: { width: "100%", marginTop: "20px", marginBottom: "28px" } });
  const progNums = el("div", { style: { display: "flex", justifyContent: "space-between", marginBottom: "6px" } });
  STEPS.forEach((s, i) => {
    progNums.appendChild(el("div", { style: { fontSize: "11px", fontFamily: "Arial, sans-serif", color: i <= state.step ? "#e53e2e" : "#444", fontWeight: i === state.step ? 700 : 400, flex: 1, textAlign: "center" } }, i < 4 ? String(i + 1) : "✓"));
  });
  const progBar = el("div", { style: { height: "3px", background: "#222", borderRadius: "2px", overflow: "hidden" } },
    el("div", { style: { height: "100%", width: progressPct() + "%", background: "linear-gradient(90deg,#e53e2e,#ff6b5b)", borderRadius: "2px", transition: "width 0.5s ease" } })
  );
  const progLabel = el("div", { style: { textAlign: "center", marginTop: "5px", fontSize: "11px", color: "#555", fontFamily: "Arial, sans-serif" } }, "Krok " + (Math.min(state.step + 1, 4)) + " ze 4");
  progWrap.appendChild(progNums);
  progWrap.appendChild(progBar);
  progWrap.appendChild(progLabel);
  app.appendChild(progWrap);

  // Card
  const card = el("div", { style: { width: "100%", background: "#111", border: "1px solid #222", borderRadius: "16px", padding: "clamp(20px,5vw,36px)", minHeight: "320px" } });

  // STEP 0
  if (state.step === 0) {
    card.appendChild(stepTitle("Jsi muž nebo žena?"));
    card.appendChild(subText("Pohlaví ovlivňuje výpočet bazálního metabolismu."));
    const row = el("div", { style: { display: "flex", gap: "16px", marginTop: "24px" } });
    [{ val: "female", emoji: "👩", label: "Žena" }, { val: "male", emoji: "👨", label: "Muž" }].forEach(opt => {
      const active = state.gender === opt.val;
      const btn = el("button", {
        style: { flex: 1, display: "flex", flexDirection: "column", alignItems: "center", padding: "26px 16px", borderRadius: "12px", border: active ? "2px solid #e53e2e" : "1px solid #2a2a2a", background: active ? "rgba(229,62,46,0.08)" : "#161616", color: "#fff", transition: "all 0.2s" },
        onClick: () => { state.gender = opt.val; render(); }
      },
        el("span", { style: { fontSize: "40px" } }, opt.emoji),
        el("span", { style: { fontSize: "16px", fontWeight: 700, marginTop: "8px", fontFamily: "Arial, sans-serif" } }, opt.label)
      );
      row.appendChild(btn);
    });
    card.appendChild(row);
  }

  // STEP 1
  if (state.step === 1) {
    card.appendChild(stepTitle("Základní údaje"));
    card.appendChild(subText("Přesné hodnoty = přesný výsledek."));
    const grid = el("div", { style: { display: "grid", gridTemplateColumns: "1fr 1fr", gap: "16px", marginTop: "24px" } });
    [
      { label: "Věk (roky)", key: "age", ph: "např. 45" },
      { label: "Výška (cm)", key: "height", ph: "např. 165" },
      { label: "Aktuální váha (kg)", key: "weight", ph: "např. 78" },
      { label: "Cílová váha (kg) *", key: "targetWeight", ph: "např. 65" },
    ].forEach(f => {
      const wrap = el("div", null);
      wrap.appendChild(el("label", { style: { display: "block", fontFamily: "Arial, sans-serif", fontSize: "12px", color: "#666", marginBottom: "6px" } }, f.label));
      const inp = el("input", { type: "number", placeholder: f.ph, min: "0", value: state[f.key], style: { width: "100%", padding: "12px 14px", background: "#1a1a1a", border: "1px solid #2a2a2a", borderRadius: "8px", color: "#fff", fontFamily: "Arial, sans-serif", fontSize: "15px", outline: "none" } });
      inp.addEventListener("input", e => { state[f.key] = e.target.value; });
      wrap.appendChild(inp);
      grid.appendChild(wrap);
    });
    card.appendChild(grid);
    card.appendChild(el("p", { style: { fontSize: "11px", color: "#555", marginTop: "12px", fontFamily: "Arial, sans-serif" } }, "* Volitelné — pro výpočet délky hubnutí."));
  }

  // STEP 2
  if (state.step === 2) {
    card.appendChild(stepTitle("% podkožního tuku"));
    card.appendChild(subText("Vyber postavu, která ti nejvíce odpovídá."));
    const imgBtn = el("button", {
      style: { background: "transparent", border: "1px solid #e53e2e", color: "#e53e2e", borderRadius: "8px", padding: "8px 16px", fontSize: "13px", fontFamily: "Arial, sans-serif", marginBottom: "16px", marginTop: "10px" },
      onClick: () => { state.showFatImg = !state.showFatImg; render(); }
    }, state.showFatImg ? "Skrýt ukázkový obrázek ↑" : "Zobrazit ukázkový obrázek 👁");
    card.appendChild(imgBtn);
    if (state.showFatImg) {
      const imgWrap = el("div", { style: { marginBottom: "18px", borderRadius: "10px", overflow: "hidden", border: "1px solid #333" } },
        el("img", { src: FAT_IMAGE, alt: "Ukázkový obrázek % podkožního tuku", style: { width: "100%", display: "block" } })
      );
      card.appendChild(imgWrap);
    }
    const levels = state.gender === "female" ? fatLevels.female : fatLevels.male;
    const btnWrap = el("div", { style: { display: "flex", flexWrap: "wrap", gap: "10px", marginTop: "4px" } });
    levels.forEach(f => {
      const active = state.fatPct === f;
      btnWrap.appendChild(el("button", {
        style: { padding: "10px 18px", borderRadius: "8px", border: active ? "2px solid #e53e2e" : "1px solid #333", background: active ? "#e53e2e" : "#1a1a1a", color: "#fff", fontFamily: "Arial, sans-serif", fontWeight: active ? 700 : 400, fontSize: "15px", transition: "all 0.2s" },
        onClick: () => { state.fatPct = f; render(); }
      }, f + "%"));
    });
    card.appendChild(btnWrap);
  }

  // STEP 3
  if (state.step === 3) {
    card.appendChild(stepTitle("Jak aktivní jsi v běžném životě?"));
    card.appendChild(subText("Buď upřímná — přesná aktivita = přesný výsledek."));
    const list = el("div", { style: { display: "flex", flexDirection: "column", gap: "12px", marginTop: "20px" } });
    activityLevels.forEach((a, i) => {
      const active = state.activityIdx === i;
      list.appendChild(el("button", {
        style: { display: "flex", alignItems: "flex-start", gap: "14px", padding: "14px 16px", borderRadius: "10px", border: active ? "2px solid #e53e2e" : "1px solid #2a2a2a", background: active ? "rgba(229,62,46,0.08)" : "#161616", color: "#fff", textAlign: "left", transition: "all 0.2s", width: "100%" },
        onClick: () => { state.activityIdx = i; render(); }
      },
        el("span", { style: { fontSize: "24px", minWidth: "30px", marginTop: "2px" } }, a.icon),
        el("div", { style: { flex: 1 } },
          el("div", { style: { fontFamily: "Arial, sans-serif", fontWeight: 700, fontSize: "13px" } }, a.label),
          el("div", { style: { fontFamily: "Arial, sans-serif", fontSize: "12px", color: "#888", marginTop: "3px", lineHeight: 1.5 } }, a.desc)
        ),
        el("div", { style: { fontSize: "12px", fontFamily: "Arial, sans-serif", color: active ? "#e53e2e" : "#444", fontWeight: 700, whiteSpace: "nowrap", marginTop: "2px" } }, "× " + a.coef)
      ));
    });
    card.appendChild(list);
  }

  // STEP 4
  if (state.step === 4) {
    const r = calcResults();
    const gw = weeksToGoal();

    card.appendChild(stepTitle("Tvůj SEMI plán 🎯"));
    card.appendChild(subText("Tady jsou tvoje přesné hodnoty. Kuchařka + návod udělají zbytek."));

    // Metriky
    const metricGrid = el("div", { style: { display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: "10px", marginTop: "20px" } });
    [
      { label: "Bazální metabolismus", value: r.bmr, unit: "kcal", highlight: false },
      { label: "Udržovací kalorie", value: r.tdee, unit: "kcal", highlight: false },
      { label: "Tvůj denní příjem", value: r.deficit, unit: "kcal", highlight: true },
    ].forEach(m => {
      metricGrid.appendChild(el("div", { style: { background: m.highlight ? "rgba(229,62,46,0.06)" : "#161616", border: "1px solid " + (m.highlight ? "rgba(229,62,46,0.5)" : "#222"), borderRadius: "10px", padding: "12px 8px", textAlign: "center" } },
        el("div", { style: { fontSize: "clamp(18px,4vw,26px)", fontWeight: 700, color: m.highlight ? "#e53e2e" : "#fff", fontFamily: "Arial, sans-serif", lineHeight: 1 } }, String(m.value)),
        el("div", { style: { fontSize: "10px", color: "#666", fontFamily: "Arial, sans-serif", marginTop: "2px" } }, m.unit),
        el("div", { style: { fontSize: "10px", color: "#555", fontFamily: "Arial, sans-serif", marginTop: "5px", lineHeight: 1.3 } }, m.label)
      ));
    });
    card.appendChild(metricGrid);

    // Cílová váha
    if (gw) {
      card.appendChild(el("div", { style: { marginTop: "14px", padding: "12px 18px", background: "rgba(229,62,46,0.07)", border: "1px solid rgba(229,62,46,0.3)", borderRadius: "10px", fontFamily: "Arial, sans-serif", fontSize: "13px", color: "#ccc", lineHeight: 1.6 } },
        txt("🎯 Při udržitelném tempu 0,5–1 kg/týden dosáhneš cílové váhy "),
        el("strong", { style: { color: "#fff" } }, state.targetWeight + " kg"),
        txt(" přibližně za "),
        el("strong", { style: { color: "#e53e2e" } }, gw.min + "–" + gw.max + " týdnů"),
        txt(". Orientačně.")
      ));
    }

    // Makra
    const macroTitle = el("div", { style: { fontFamily: "Arial, sans-serif", fontSize: "11px", color: "#666", letterSpacing: "0.1em", textTransform: "uppercase", marginBottom: "12px", marginTop: "22px" } }, "Denní makroživiny");
    card.appendChild(macroTitle);

    [
      { label: "🥩 Bílkoviny", grams: r.protein, kcal: r.proteinKcal, pct: Math.round(r.proteinKcal / r.deficit * 100), color: "#e53e2e", note: "1,6 g / kg tělesné váhy" },
      { label: "🥑 Tuky", grams: r.fat, kcal: r.fatKcal, pct: Math.round(r.fatKcal / r.deficit * 100), color: "#f59e0b", note: "0,7 g / kg tělesné váhy" },
      { label: "🍚 Sacharidy", grams: r.carbs, kcal: r.carbsKcal, pct: Math.round(r.carbsKcal / r.deficit * 100), color: "#3b82f6", note: "zbytek kalorií" },
    ].forEach(m => {
      const row = el("div", { style: { background: "#161616", border: "1px solid #222", borderRadius: "10px", padding: "12px 14px", marginBottom: "8px" } });
      const top = el("div", { style: { display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: "6px" } },
        el("span", { style: { fontFamily: "Arial, sans-serif", fontSize: "13px", fontWeight: 700 } }, m.label),
        el("span", { style: { fontFamily: "Arial, sans-serif", fontSize: "13px", color: "#888" } },
          el("strong", { style: { color: "#fff", fontSize: "15px" } }, m.grams + "g"),
          txt(" · " + m.kcal + " kcal")
        )
      );
      const bar = el("div", { style: { height: "4px", background: "#222", borderRadius: "2px" } },
        el("div", { style: { height: "100%", width: m.pct + "%", background: m.color, borderRadius: "2px" } })
      );
      const bottom = el("div", { style: { display: "flex", justifyContent: "space-between", marginTop: "5px" } },
        el("span", { style: { fontSize: "11px", color: "#555", fontFamily: "Arial, sans-serif" } }, m.note),
        el("span", { style: { fontSize: "11px", color: m.color, fontFamily: "Arial, sans-serif", fontWeight: 700 } }, m.pct + "%")
      );
      row.appendChild(top); row.appendChild(bar); row.appendChild(bottom);
      card.appendChild(row);
    });

    // Kontrola
    card.appendChild(el("div", { style: { marginTop: "14px", padding: "10px 14px", background: "#1a1a1a", borderRadius: "8px", fontFamily: "Arial, sans-serif", fontSize: "12px", color: "#555" } },
      txt("Kontrola: " + r.proteinKcal + " + " + r.fatKcal + " + " + r.carbsKcal + " = "),
      el("strong", { style: { color: "#777" } }, (r.proteinKcal + r.fatKcal + r.carbsKcal) + " kcal"),
      txt(" ✓")
    ));

    // Praxi
    card.appendChild(el("div", { style: { marginTop: "20px", padding: "14px 18px", background: "#161616", borderRadius: "10px", border: "1px solid #2a2a2a", fontFamily: "Arial, sans-serif", fontSize: "13px", color: "#aaa", lineHeight: 1.7 } },
      el("strong", { style: { color: "#fff", display: "block", marginBottom: "6px" } }, "Co to znamená v praxi?"),
      txt("Jedeš na "),
      el("strong", { style: { color: "#e53e2e" } }, r.deficit + " kcal denně"),
      txt(". To ti umožní jíst normálně 3–5× denně bez hladovění. Z Kuchařky si složíš jídelníček přesně na tento příjem — krok za krokem ti to ukáže návod.")
    ));

    // Poznámka
    card.appendChild(el("p", { style: { fontSize: "11px", color: "#444", fontFamily: "Arial, sans-serif", marginTop: "10px", lineHeight: 1.6 } },
      "* Výpočet je orientační. Pokud váha a cm obvodů těla nejdou 2–3 týdny dolů, sniž příjem o 100–200 kcal dolů a zvaž se a změř za 2 týdny."
    ));

    // CTA
    const cta = el("div", { style: { marginTop: "28px", padding: "26px 22px", background: "linear-gradient(135deg,#1a0a0a,#1f0f0f)", border: "1px solid rgba(229,62,46,0.4)", borderRadius: "14px", textAlign: "center" } },
      el("div", { style: { fontSize: "11px", letterSpacing: "0.2em", textTransform: "uppercase", color: "#e53e2e", fontFamily: "Arial, sans-serif", fontWeight: 700, marginBottom: "8px" } }, "Chceš celý systém?"),
      el("div", { style: { fontSize: "clamp(16px,4vw,22px)", fontWeight: 700, lineHeight: 1.3, marginBottom: "6px" } }, "Zapiš se na bezplatnou konzultaci"),
      el("div", { style: { fontSize: "13px", color: "#888", fontFamily: "Arial, sans-serif", marginBottom: "18px", lineHeight: 1.6 } }, "45 minut 1v1 se Semim. Nastavíme plán přesně na tebe bez hladovění, který pomohl už 659 lidem."),
      el("a", {
        href: "https://semifitness.cz/p/zarezervuj-si-30-min-konzultaci-zdarma-se-semim-1-voln-m-sto--wlfqj8cwb",
        target: "_blank", rel: "noopener noreferrer",
        style: { display: "inline-block", background: "#e53e2e", color: "#fff", padding: "14px 32px", borderRadius: "10px", fontFamily: "Arial, sans-serif", fontWeight: 700, fontSize: "15px", textDecoration: "none", letterSpacing: "0.02em" }
      }, "Zapiš se na KONZULTACI ZDARMA →")
    );
    card.appendChild(cta);

    // Reset
    const resetBtn = el("button", {
      style: { marginTop: "16px", background: "transparent", border: "1px solid #333", borderRadius: "10px", color: "#555", padding: "10px 24px", fontFamily: "Arial, sans-serif", fontSize: "13px", display: "block", margin: "16px auto 0" },
      onClick: () => {
        state = { step: 0, gender: null, age: "", height: "", weight: "", targetWeight: "", fatPct: null, activityIdx: null, showFatImg: false };
        render();
      }
    }, "↺ Začít znovu");
    card.appendChild(resetBtn);
  }

  app.appendChild(card);

  // Nav buttons
  if (state.step < 4) {
    const nav = el("div", { style: { display: "flex", gap: "12px", marginTop: "18px", width: "100%" } });
    if (state.step > 0) {
      nav.appendChild(el("button", {
        style: { flex: 1, padding: "14px", background: "transparent", border: "1px solid #333", borderRadius: "10px", color: "#666", fontFamily: "Arial, sans-serif", fontSize: "14px" },
        onClick: () => { state.step--; render(); }
      }, "← Zpět"));
    }
    const ok = canNext();
    nav.appendChild(el("button", {
      style: { flex: 2, padding: "14px", background: ok ? "#e53e2e" : "#2a2a2a", border: "none", borderRadius: "10px", color: ok ? "#fff" : "#555", fontFamily: "Arial, sans-serif", fontWeight: 700, fontSize: "15px", transition: "all 0.2s" },
      disabled: !ok,
      onClick: () => { if (canNext()) { state.step++; render(); } }
    }, state.step === 3 ? "Zobrazit výsledky 🎯" : "Pokračovat →"));
    app.appendChild(nav);
  }

  // Footer
  app.appendChild(el("div", { style: { marginTop: "36px", textAlign: "center", fontFamily: "Arial, sans-serif", fontSize: "11px", color: "#333", lineHeight: 1.8 } },
    txt("SEMI – Fitness Coaching | @semi_fitness_coaching"), el("br", null),
    txt("Výsledky jsou orientační a neslouží jako lékařská rada.")
  ));
}

function stepTitle(text) {
  const h = document.createElement("h2");
  h.textContent = text;
  h.style.cssText = "font-size:clamp(18px,4vw,24px);font-weight:700;margin:0;letter-spacing:-0.01em;line-height:1.2;";
  return h;
}

function subText(text) {
  const p = document.createElement("p");
  p.textContent = text;
  p.style.cssText = "font-family:Arial,sans-serif;font-size:13px;color:#777;margin:8px 0 0;line-height:1.6;";
  return p;
}

render();
</script>
</body>
</html>
